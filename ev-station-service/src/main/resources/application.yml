server:
  port: 8081

spring:
  application:
    name: station-service   # IMPORTANT (used by Gateway)

  datasource:
    url: jdbc:mysql://localhost:3306/station_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    root: INFO
    com.example.evstation: DEBUG

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"