server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: ev-station-service
          uri: lb://EV-STATION-SERVICE
          predicates:
            - Path=/api/stations/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka